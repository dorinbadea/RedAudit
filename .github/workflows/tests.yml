name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_test_matrix: ${{ steps.classify.outputs.run_test_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          else
            BEFORE_SHA="${{ github.event.before }}"
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA"...HEAD)"
            else
              CHANGED_FILES="$(git diff --name-only HEAD~1...HEAD)"
            fi
          fi

          printf '%s\n' "$CHANGED_FILES"

          SAFE_ONLY=true
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              docs/*|ES/*|*.md|AGENTS.md|.cursorrules|agents/*|.agent/*)
                ;;
              *)
                SAFE_ONLY=false
                break
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            SAFE_ONLY=false
          fi

          if [ "$SAFE_ONLY" = true ]; then
            echo "run_test_matrix=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_test_matrix=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: ${{ needs.changes.outputs.run_test_matrix == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=redaudit --cov-report=xml --cov-report=term-missing --cov-report=json

      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

      - name: Enforce changed-file coverage >=98%
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          python scripts/check_changed_coverage.py \
            --coverage-file coverage.json \
            --threshold 98 \
            --base-ref "${BASE_REF}"

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact for badges
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-main-py311
          path: coverage.json
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify agent workflow pointers
        run: |
          bash scripts/check_agent_pointers.sh

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning

  update-badge:
    needs: [changes, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.changes.outputs.run_test_matrix == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-main-py311

      - name: Read coverage from existing artifact
        id: coverage
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          coverage_data = json.loads(Path("coverage.json").read_text())
          coverage = float(coverage_data["totals"]["percent_covered"])
          if coverage >= 90:
              color = "brightgreen"
          elif coverage >= 70:
              color = "yellow"
          else:
              color = "red"

          print(f"coverage={coverage:.2f}")
          print(f"coverage_color={color}")
          PY

      - name: Count tests
        id: count
        run: |
          TEST_COUNT=$(grep -r "def test_" tests/ --include="*.py" | wc -l | tr -d ' ')
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "Found $TEST_COUNT tests"

      - name: Update Tests Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: redaudit-tests.json
          label: tests
          message: ${{ steps.count.outputs.test_count }} passing
          color: brightgreen

      - name: Update Coverage Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: redaudit-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}%
          color: ${{ steps.coverage.outputs.coverage_color }}
